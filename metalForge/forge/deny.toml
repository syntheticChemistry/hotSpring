# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for hotspring-forge crate.
#
# Run:     cargo deny check
# Install: cargo install cargo-deny

[graph]
targets = []
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
unused-allowed-license = "allow"
allow = [
    "AGPL-3.0-or-later",
    "AGPL-3.0-only",
    "AGPL-3.0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = [
    { crate = "openssl-sys", wrappers = [], reason = "C dependency — Tower Atomic delegation" },
    { crate = "openssl", wrappers = [], reason = "C dependency" },
    { crate = "native-tls", wrappers = [], reason = "C dependency" },
    { crate = "async-trait", wrappers = [], reason = "Stadial invariant: zero async-trait" },
    { crate = "cc", wrappers = ["blake3"], reason = "C compiler — allowed via blake3 only" },
    { crate = "pkg-config", wrappers = ["khronos-egl"], reason = "C build tool — wgpu portability" },
]
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
