#
# hotSpring Capability Registry
#
# Authoritative list of capabilities this spring exposes. Bidirectional
# sync tested against niche.rs (LOCAL_CAPABILITIES + ROUTED_CAPABILITIES).
# When adding a capability, add it here AND in niche.rs — the test
# `capabilities_match_registry_toml` enforces lockstep.
#
# Schema: each [[capabilities]] entry has:
#   method   — fully qualified domain.operation name
#   served   — "local" (hotspring_primal handles) or "routed" (proxy to provider)
#   provider — canonical primal for routed capabilities (empty for local)
#   domain   — top-level domain grouping

