# hotSpring BarraCuda — Clippy configuration
#
# Physics code necessarily uses usize↔f64 casts, similar variable names
# (vx/vy/vz, rho_p/rho_n), and single-character physics variables (r, k, q).
# These are idiomatic in computational physics, not bugs.

# too-many-lines is globally allowed in Cargo.toml (physics modules justify it).
# This threshold is intentionally absent — the lint is suppressed, not thresholded.
too-many-arguments-threshold = 12
