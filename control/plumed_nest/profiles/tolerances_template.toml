# === Free Energy Surface Tolerances ===

[[tolerance]]
name = "fes_barrier_convergence"
value = 5.0
unit = "kJ/mol"
justification = "Well-tempered metadynamics converges barriers within 5 kJ/mol after >5000 Gaussians on alanine dipeptide (Barducci et al. PRL 2008; reproduced as Target 01)"
reference = "plumID:24.020"

[[tolerance]]
name = "fes_minimum_location"
