# Machine-readable domain ↔ computation index mapping
# Domain = PDB serial numbering (biochemistry standard)
# Computation = GROMACS topology numbering (runtime requirement)

[meta]
pdb = "2D24"
resolution_angstrom = 1.41
ring_order = ["C1", "C2", "C3", "C4", "C5", "O5"]
cremer_pople_convention = "C1-C2-C3-C4-C5-O5"

[systems.free-xylose]
description = "Single beta-D-xylopyranose in TIP3P water box"
