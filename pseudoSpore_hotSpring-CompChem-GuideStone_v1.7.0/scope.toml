[artifact]
name = "hotSpring-CompChem-GuideStone"
version = "1.7.0"
type = "pseudoSpore"
origin = "ecoPrimals/springs/hotSpring"
experiment = 230
license = "AGPL-3.0-or-later"
domain = "computational-chemistry"
description = "Epimer survey + mechanistic comparison: 4 free sugar FELs (lyxose/glucose/mannose/galactose), GH10 2D24 -2/+1 subsite analysis, GH11 1XYN inverting xylanase, plus baseline modules 01-08 from v1.6.1"

[target]
paper_doi = "10.1039/C4SC02240H"
paper_title = "The complete conformational free energy landscape of β-xylose reveals a two-fold catalytic itinerary for β-xylanases"
paper_authors = "Iglesias-Fernández, Raich, Ardèvol, Rovira"
paper_year = 2015
paper_pdb = "2D24"
paper_system = "GH10 xylanase (S. olivaceoviridis E-86)"

[references]
plum_ids = ["24.020", "24.029", "25.007"]
additional_papers = [
    "Invernizzi & Parrinello, J. Phys. Chem. Lett. 11, 2731 (2020)",
    "Barducci, Bussi & Parrinello, Phys. Rev. Lett. 100, 020603 (2008)",
    "Nin-Hill (2020) PhD thesis, Rovira group — Ch.3: QM/MM + metadynamics FEL methodology for glycoside hydrolases",
    "Alonso-Gil (2019) PhD thesis, Rovira group — Ch.2.2-2.4: PBE DFT + GLYCAM equations for carbohydrate QM/MM",
    "Grothaus, Bussi, Colombi Ciacchi, JCIM 62:4992 (2022) — REST-RECT glycan puckering (plumID 22.028)",
    "Biarnés et al., JACS 129:10686 (2007) — Cremer-Pople metadynamics for GH enzyme catalytic itineraries",
]

[collaboration]
project = "ABG Conformational Energy Landscapes"
channel = "#conformational-energy-landscapes"
collaborators = ["Tamison (compute + pipeline)", "Alistaire (domain + review)", "Mark (HPC/TAMU ACES)"]
goal = "Validate molecular docking approach via conformational FEL comparison across CAZyme families"
future_compute = "NSF ACES (TAMU, A100 GPU, .edu access via Mark)"
future_methods = ["QM/MM via CPMD (github.com/CPMD-code/CPMD)", "REST-RECT multi-replica (Grothaus)", "AutoDock Vina docking ↔ FEL correlation"]
provenance_notes = [
    "v0.6.0: first prototype (May 24) — Alistaire found atom index errors and lyxose/xylose misassignment; data ran in water but packaging omitted PDB + water box evidence",
    "v1.5.0: corrected atom indices, proper water box solvation, CHARMM36-jul2022, all data included",
    "v1.6.0: PLUMED-NEST validation aggregate + exploration roadmap for Alistaire review",
    "v1.6.1: full-data self-contained pseudoSpore; lithoSpore ingested; agentic deploy pipeline",
    "v1.7.0: Epimer survey + mechanistic comparison — 4 free sugar baselines (lyxose/glucose/mannose/galactose), GH10 -2/+1 subsite analysis, GH11 inverting xylanase (1XYN) vs GH10 retaining (2D24); 22 modules total",
]

