[target]
id = "05_enzyme_bound_1d"
plum_id = "internal"
method = "well-tempered metadynamics + UPPER_WALLS binding restraint"
description = "Enzyme-bound -1 subsite xylose puckering in GH10 xylanase (PDB 2D24) — substrate restrained to active site"
temperature_k = 300.0
cv_names = ["puck.theta", "d_bind"]

[binding_restraint]
type = "UPPER_WALLS"
atoms_substrate = "COM(BXYL heavy: 6278,6280,6282,6285,6286,6288,6290,6292,6294,6296)"
atoms_site = "COM(Glu175 OE: 2610,2611; Glu236 OE: 3552,3553)"
at_nm = 1.2
kappa_kj_mol_nm2 = 500.0
justification = "v1.6.1 substrate dissociated; flat-bottom wall allows free motion within binding pocket"

[files]
hills = "HILLS"
colvar = "COLVAR"
plumed_dat = "plumed.dat"
fes = "fes_theta.dat"

[reference]
basins = [
    { name = "4C1", x = 0.15, tolerance_rad = 0.2 },
    { name = "boat", x = 1.57, tolerance_rad = 0.3 },
    { name = "1C4", x = 3.0, tolerance_rad = 0.2 },
]
barrier_range_kjmol = [30.0, 50.0]

[tolerances]
_authority = "tolerances.toml"
barrier_kjmol = 5.0
basin_position_rad = 0.2
convergence_std_kjmol = 2.0
tier_parity_rmsd_kjmol = 1.0
enzyme_barrier_reduction_kjmol = 5.0
cross_landscape_min_divergence_kjmol = 5.0
binding_distance_max_nm = 2.0

[simulation]
nsteps = 5000000
dt_ps = 0.002
ntmpi = 1
ntomp = 8
