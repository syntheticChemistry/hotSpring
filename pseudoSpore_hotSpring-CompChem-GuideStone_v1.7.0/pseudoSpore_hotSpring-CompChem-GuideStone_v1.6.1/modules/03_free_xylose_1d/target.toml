[target]
id = "03_free_xylose_1d"
plum_id = "internal"
method = "well-tempered metadynamics"
description = "Free β-D-xylopyranose puckering (Cremer-Pople theta)"
temperature_k = 300.0
cv_names = ["puck.theta"]

[files]
hills = "HILLS"
colvar = "COLVAR"
plumed_dat = "plumed.dat"
fes = "fes_theta.dat"

[reference]
basins = [
    { name = "4C1", x = 0.15, tolerance_rad = 0.2 },
    { name = "boat", x = 1.57, tolerance_rad = 0.3 },
    { name = "1C4", x = 3.0, tolerance_rad = 0.2 },
]
barrier_range_kjmol = [35.0, 55.0]

[tolerances]
# Authority: root tolerances.toml; module overrides documented below
_authority = "tolerances.toml"
barrier_kjmol = 5.0
basin_position_rad = 0.2       # override: root=0.3; 1D puckering basins are sharper
convergence_std_kjmol = 2.0
tier_parity_rmsd_kjmol = 1.0

[simulation]
nsteps = 5000000
dt_ps = 0.002
ntmpi = 1
ntomp = 8
