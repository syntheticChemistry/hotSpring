# Domain Profile: Computational Chemistry Enhanced Sampling
# Composite profile covering metadynamics, OPES, and puckering CVs

[profile]
id = "compchem-enhanced-sampling"
version = "1.0.0"
domain = "computational-chemistry"
subdomain = ["enhanced-sampling", "protein-folding", "carbohydrate-puckering"]
tools = ["GROMACS", "PLUMED"]
methods = ["well-tempered-metadynamics", "OPES_METAD", "OPES_METAD_EXPLORE"]

[translation]
# Domain concepts → computation mappings

[[translation.entity_groups]]
name = "backbone_dihedrals"
domain_description = "Protein backbone torsion angles (Ramachandran)"
computation = "TORSION atoms from topology"
modules = ["01_alanine_dipeptide"]

[[translation.entity_groups]]
name = "hlda_cv"
domain_description = "Harmonic Linear Discriminant Analysis of native contacts"
computation = "COMBINE of CONTACTMAP distances"
modules = ["02_chignolin_opes"]

[[translation.entity_groups]]
name = "cremer_pople_ring"
domain_description = "Six-membered pyranose ring puckering coordinates"
computation = "PUCKERING ATOMS=C1,C2,C3,C4,C5,O5"
modules = ["03_free_xylose_1d", "04_free_xylose_2d", "05_enzyme_bound_1d", "06_enzyme_bound_2d"]

[derivation]
# How output artifacts are produced from raw simulation data

[[derivation.pipeline]]
name = "fes_from_hills"
description = "Free energy surface from Gaussian kernel summation (sum_hills)"
input = "HILLS"
output = "fes_*.dat"
tool = "cazyme-fel / nest-validate (Rust-native)"
alternative = "plumed sum_hills (reference)"

[[derivation.pipeline]]
name = "reweighted_fes"
description = "Free energy surface from OPES bias reweighting"
input = "COLVAR (with bias columns)"
output = "fes_reweighted.dat"
tool = "nest-validate (Rust-native exponential reweighting)"

[audit]
# Validation checks applicable to this domain

[[audit.checks]]
name = "simulation_time"
description = "MDP nsteps × dt matches declared simulation time"
applies_to = "all"

[[audit.checks]]
name = "cv_definition"
description = "PLUMED input CV atoms match topology indices"
applies_to = "all"

[[audit.checks]]
name = "basin_detection"
description = "Expected free energy basins detected at correct positions"
applies_to = ["01_alanine_dipeptide", "03_free_xylose_1d", "05_enzyme_bound_1d"]

[[audit.checks]]
name = "barrier_convergence"
description = "Block-averaged barriers within tolerance of final value"
applies_to = ["01_alanine_dipeptide", "03_free_xylose_1d", "05_enzyme_bound_1d"]

[[audit.checks]]
name = "transition_count"
description = "Sufficient fold/unfold transitions for statistical convergence"
applies_to = ["02_chignolin_opes"]

[[audit.checks]]
name = "tier_parity"
description = "FES RMSD between tiers within tolerance"
applies_to = ["03_free_xylose_1d", "04_free_xylose_2d", "05_enzyme_bound_1d", "06_enzyme_bound_2d"]

[figures]
# Data-only pseudoSpore: figures generated on demand via `nest-validate guidestone finalize`
# Full lithoSpore carries pre-rendered PNGs in figures/
auto_generate = false

[[figures.plot]]
name = "ramachandran_fel"
module = "01_alanine_dipeptide"
type = "2d_heatmap"
axes = ["phi (rad)", "psi (rad)"]
colorbar = "kJ/mol"

[[figures.plot]]
name = "puckering_1d"
modules = ["03_free_xylose_1d", "05_enzyme_bound_1d"]
type = "1d_line"
x_axis = "theta (rad)"
y_axis = "F(theta) kJ/mol"
overlay = true

[[figures.plot]]
name = "stoddart_2d"
modules = ["04_free_xylose_2d", "06_enzyme_bound_2d"]
type = "2d_heatmap"
axes = ["qx (nm)", "qy (nm)"]
colorbar = "kJ/mol"
