# GuideStone Tolerances — quantitative acceptance criteria per module
# Derived from PLUMED-NEST reproducibility and Tier parity testing
#
# AUTHORITY MODEL:
#   This file is the design registry (authoritative defaults).
#   Module target.toml files may override individual values with documented
#   justification. Overrides reference this file via `_authority = "tolerances.toml"`.
#   The pipeline cross-checks both sources and flags undocumented divergences.

[meta]
version = "1.2"
derived_from = [
    "plumID:24.020",
    "plumID:24.029",
    "control/gromacs_fel/validation_matrix.json",
    "derivations/threshold_calibration.toml",
]
last_updated = "2026-05-28"
authority_model = "root=default, module target.toml=override with justification"
derivation_policy = """All numeric thresholds must trace to derivations/threshold_calibration.toml \
which documents the empirical measurement chain (Layers 1-5). Values without derivation \
are flagged as UNANCHORED and must not be used for pass/fail decisions."""

# === Per-module tolerances ===
# STATUS KEY:
#   derivation = "..." → fully anchored (measurement → derivation → value)
#   _anchoring = "literature" → value from published paper (acceptable, external authority)
#   _anchoring = "NEEDS_CALIBRATION" → inherited from earlier versions, needs Layer 1-5 derivation

[[tolerance]]
name = "fes_basin_position"
value = 0.3
unit = "rad"
applies_to = ["01_alanine_dipeptide", "03_free_xylose_1d", "05_enzyme_bound_1d"]
_anchoring = "literature"
justification = "Metadynamics basin positions converge within 0.3 rad after sufficient Gaussians (Barducci 2008)"
reference = "plumID:24.020; Barducci et al. Phys. Rev. Lett. 100, 020603 (2008), Fig. 2"

[[tolerance]]
name = "fes_barrier_height"
value = 5.0
unit = "kJ/mol"
applies_to = ["01_alanine_dipeptide", "03_free_xylose_1d", "05_enzyme_bound_1d"]
_anchoring = "literature"
justification = "Well-tempered metadynamics barriers converge within 5 kJ/mol of infinite-time limit"
reference = "Barducci et al. Phys. Rev. Lett. 100, 020603 (2008), Table I convergence analysis"

[[tolerance]]
name = "fes_convergence_window"
value = 2.0
unit = "kJ/mol"
applies_to = ["01_alanine_dipeptide"]
_anchoring = "literature"
justification = "Block-averaged FES variation in final 20% of simulation"
reference = "Grossfield et al. LAJP 1, 23 (2009), Sec. 4.2"

[[tolerance]]
name = "opes_folding_fe"
value = 4.0
unit = "kJ/mol"
applies_to = ["02_chignolin_opes"]
_anchoring = "literature"
justification = "OPES free energy estimates converge within 4 kJ/mol with sufficient transitions"
reference = "Ray & Rizzi, JCTC (2024)"

[[tolerance]]
name = "opes_transition_minimum"
value = 6.0
unit = "count"
applies_to = ["02_chignolin_opes"]
_anchoring = "literature"
justification = "Minimum 6 fold/unfold transitions for statistically meaningful ΔG estimate"
reference = "Invernizzi & Parrinello, J. Phys. Chem. Lett. 11, 2731 (2020)"

[[tolerance]]
name = "tier_parity_1d"
value = 1.0
unit = "kJ/mol"
applies_to = ["03_free_xylose_1d", "05_enzyme_bound_1d"]
_anchoring = "derived"
derivation = "pipeline.parity_rmsd_1d"
justification = """1D FES parity: max RMSD per single run ≈ 0.30 kJ/mol (Layer 2). \
Tier 0→2 allows compounding from two independent stochastic runs: \
√(0.30² + 0.30²) = 0.42, rounded to 1.0 with generous margin for force-field sensitivity."""
reference = "derivations/threshold_calibration.toml [pipeline.parity_rmsd_1d]"

[[tolerance]]
name = "tier_parity_2d"
value = 2.0
unit = "kJ/mol"
applies_to = ["04_free_xylose_2d", "06_enzyme_bound_2d"]
_anchoring = "derived"
derivation = "pipeline.parity_rmsd_2d"
justification = """2D FES parity: same logic as 1D but 2D landscapes have more grid points \
averaging noise. Conservative factor: 2× the 1D tolerance. Empirically, 2D parity RMSD \
is always ≤ 1D (observed: 0.00 across all 2D modules), so 2.0 is generous."""
reference = "derivations/threshold_calibration.toml [pipeline.parity_rmsd_2d]"

[[tolerance]]
name = "puckering_4c1_population"
value = 0.85
unit = "fraction"
applies_to = ["03_free_xylose_1d"]
_anchoring = "literature"
justification = "4C1 chair must be dominant (>85%) in free pyranose at 300K"
reference = "Grothaus et al. Chem. Eur. J. (2022), Fig. 3 population analysis"

[[tolerance]]
name = "enzyme_barrier_reduction"
value = 2.0
unit = "kJ/mol"
applies_to = ["05_enzyme_bound_1d"]
derivation = "thresholds.enzyme_barrier_reduction"
justification = """Smallest measured basin effect (boat: 2.40 kJ/mol) minus noise (0.30) = 2.10 → 2.0. \
Basin SNR = 2.40/0.30 = 8.0. Monomer shows ~25% of full oligomer effect \
(Iglesias-Fernández 2015: 5-15 kJ/mol with pentaxylose). Difference is cooperative \
stabilization from chain contacts, not computational artifact."""
reference = "derivations/threshold_calibration.toml [thresholds.enzyme_barrier_reduction]"

[[tolerance]]
name = "cross_landscape_min_divergence_1d"
value = 1.5
unit = "kJ/mol"
applies_to = ["05_enzyme_bound_1d"]
derivation = "thresholds.cross_landscape_1d"
justification = """max(3 × noise_floor, kT/5) = max(0.90, 0.50) → rounded to 1.5 kJ/mol. \
Noise floor = 0.30 kJ/mol (Layer 2: max parity RMSD across 18 modules). \
Signal = 2.39 kJ/mol (Layer 3: confirmed-bound monomer, SNR = 8.0 vs noise). \
SNR at threshold: 2.39/1.5 = 1.6 (passes real signal with margin)."""
reference = "derivations/threshold_calibration.toml [thresholds.cross_landscape_1d]"

[[tolerance]]
name = "cross_landscape_min_divergence_2d"
value = 0.3
unit = "kJ/mol"
applies_to = ["06_enzyme_bound_2d"]
derivation = "thresholds.cross_landscape_2d"
justification = """Equals reproducibility floor (Layer 2). 2D Cartesian dilutes signal by \
√(N_2d/N_1d) ≈ 10.5×; only detects total identity (dissociated = free). \
Signal = 0.52 kJ/mol, SNR = 1.73. Primary detection defers to 1D + binding + KS."""
reference = "derivations/threshold_calibration.toml [thresholds.cross_landscape_2d]"

[[tolerance]]
name = "binding_distance_max"
value = 2.0
unit = "nm"
applies_to = ["05_enzyme_bound_1d", "06_enzyme_bound_2d"]
derivation = "thresholds.binding_distance_max"
justification = """Crystal d_COM = 0.8 nm; measured mean = 0.90 nm; measured max = 1.39 nm; \
σ = 0.154 nm. Threshold at 2.0 nm = 7.1σ from mean. GH10 active site cleft depth ≈ 1.5 nm; \
any frame >2.0 nm has unambiguously left the pocket. Independent MDAnalysis confirms PLUMED \
distances to 0.009 nm agreement."""
reference = "derivations/threshold_calibration.toml [thresholds.binding_distance_max]"

[[tolerance]]
name = "ks_distribution_alpha"
value = 0.05
unit = "p-value"
applies_to = ["05_enzyme_bound_1d"]
derivation = "thresholds.ks_alpha"
justification = """Standard two-sample KS test at 95% confidence. With n≈10000 per distribution, \
D_critical = 1.36/√(n) = 0.0192. Measured D = 0.0227 (ratio 1.18×). \
As sample size grows (longer simulations), critical value shrinks as 1/√n, \
making the test more sensitive without changing α."""
reference = "derivations/threshold_calibration.toml [thresholds.ks_alpha]"

[[tolerance]]
name = "refresh_shift_maximum"
value = 3.0
unit = "kJ/mol"
applies_to = "all"
_anchoring = "operational"
derivation = "pipeline.refresh_shift_boundary"
justification = """3× the tier_parity_1d tolerance (1.0 kJ/mol). Software stack updates \
(GROMACS 2024→2026, force field patches) can shift basins by 1-3 kJ/mol without \
indicating a bug. Informational during finalize (not a hard FAIL)."""
reference = "derivations/threshold_calibration.toml [pipeline.refresh_shift_boundary]"
