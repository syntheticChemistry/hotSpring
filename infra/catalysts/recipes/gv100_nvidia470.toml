# Catalyst Recipe: Volta (GV100) via nvidia-470
#
# This recipe defines how to produce a catalyst .ko module from raw
# DKMS source. Given the same DKMS source + kernel, the recipe
# reproduces an identical patched module.
#
# The PatchSet in module_patch.rs is the code-level implementation.
# This TOML externalizes it for archival and iteration.
#
# RECONCILED: 2026-05-26 — aligned with live `nvidia_catalyst_handoff()`
# in `module_patch.rs`. Key changes from Exp 219 original:
#   - nv_pci_remove: RetAtEntry → surgical NopCallAt (4 offsets)
#   - gpuStateUnload_IMPL, gpuStateDestroy_IMPL, _deviceTeardown,
#     clTeardown_IMPL, fecsBufferTeardown: REMOVED (PCI resource cleanup
#     must run to avoid stale iomem entries)
#   - nv_cap_init, nv_cap_drv_init: REMOVED (allows RM cap table init)

[catalyst]
name = "gv100_nvidia470_catalyst"
gpu_family = "Volta"
chip = "GV100"
description = "nvidia-470 catalyst for TPC sovereignty on Titan V"

[source]
dkms_module = "nvidia"
dkms_version = "470.256.02"
driver_type = "proprietary"
supports_volta_legacy_rm = true

[build]
kernel = "6.17.9-76061709-generic"
patch_set = "nvidia_catalyst_handoff"
module_rename = { from = "nvidia", to = "nvsov" }
settle_secs = 60

[objcopy]
remove_sections = [
    "__ksymtab",
    "__kcrctab",
    "__ksymtab_strings",
    ".rela__ksymtab",
]

# Surgical teardown NOPs inside nv_pci_remove — NOP only GPU-state-destroying
# calls while letting PCI resource cleanup (__release_region, pci_disable_device)
# run normally. Prevents stale BAR0 claims in kernel iomem tree.
# Call offsets verified against nvidia-470.256.02 on kernel 6.17.9 via
# objdump + readelf relocation table.
[[patches]]
symbol = "nv_pci_remove"
strategy = "NopCallAt(0x374)"
purpose = "NOP GPU state destroy call at offset 0x374"

[[patches]]
symbol = "nv_pci_remove"
strategy = "NopCallAt(0x3a0)"
purpose = "NOP GPU state destroy call at offset 0x3a0"

[[patches]]
symbol = "nv_pci_remove"
strategy = "NopCallAt(0x1fe)"
purpose = "NOP GPU state destroy call at offset 0x1fe"

[[patches]]
symbol = "nv_pci_remove"
strategy = "NopCallAt(0x2a0)"
purpose = "NOP GPU state destroy call at offset 0x2a0"

# Co-load isolation NOPs — prevent host nvidia conflicts.
# nv_cap_init and nv_cap_drv_init are NOT patched (removed from NOP set
# vs nvidia_warm_handoff) — RM capability tables must initialize for
# full engine init (SEC2/ACR/PMU/GPCCS/FECS/TPC).
[[patches]]
symbol = "nv_procfs_init"
strategy = "RetAtEntry"
purpose = "Prevent /proc/driver/nvidia/ conflict with host nvidia"

[[patches]]
symbol = "nv_cap_procfs_init"
strategy = "RetAtEntry"
purpose = "Prevent /proc capability registration conflict"

[[patches]]
symbol = "nvlink_core_init"
strategy = "Ret1AtEntry"
purpose = "Prevent NVLink procfs conflict"

[[patches]]
symbol = "nvswitch_init"
strategy = "Ret1AtEntry"
purpose = "Prevent NVSwitch procfs conflict"

[[patches]]
symbol = "nv_acpi_init"
strategy = "RetAtEntry"
purpose = "Prevent duplicate ACPI handler registration"

[[patches]]
symbol = "nv_cap_create_dir_entry"
strategy = "RetAtEntry"
purpose = "Return NULL — RM skips cap dir operations"

[[patches]]
symbol = "nv_cap_create_file_entry"
strategy = "RetAtEntry"
purpose = "Return NULL — RM skips cap file operations"

[[patches]]
symbol = "nv_cap_destroy_entry"
strategy = "RetAtEntry"
purpose = "NOP — cap entries are stubs, nothing to destroy"

[[patches]]
symbol = "init_module"
strategy = "NopCallAt(0x7f)"
purpose = "NOP __register_chrdev — host nvidia owns major 195"

[notes]
experiment = 219
parent_experiment = 218
evolution = "Derived from nvidia_warm_handoff by removing nv_cap_init/nv_cap_drv_init NOPs; nv_pci_remove evolved from RetAtEntry to surgical NopCallAt (Exp 221); bulk teardown NOPs removed (PCI cleanup must run)"
reconciled = "2026-05-26 (Revalidation Sprint Bench 6)"
