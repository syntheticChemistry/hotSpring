# SPDX-License-Identifier: AGPL-3.0-only
# coralReef modprobe configuration — GPU fleet isolation
#
# Fleet: Titan V (10de:1d81), Tesla K80 (10de:102d), RTX 5060 (10de:2d05)
#
# SOVEREIGNTY: Prevents NVIDIA's open kernel module from probing Titan V
# at boot. The open nvidia.ko only supports Turing+ (GSP-capable) GPUs;
# its failed probe on Volta corrupts HBM2 state and causes lockups.
# K80 sits behind a PLX PEX 8747 switch — any failed probe or re-probe
# kills the PCIe link (config space all 0xFF), requiring full power drain.
#
# Strategy:
#   - Titan V + K80 claimed by vfio-pci via PCI ID at kernel cmdline
#   - K80 MUST be in vfio-pci.ids — any re-probe through PLX kills link
#   - Udev rules set d3cold_allowed=0 and clear reset_method for K80
#   - RTX 5060 claimed by nvidia (display + shared compute)
#
# Install:
#   sudo cp scripts/boot/coralreef-dual-titanv.conf /etc/modprobe.d/
#   sudo cp scripts/boot/99-coralreef-vfio.rules /etc/udev/rules.d/
#   sudo cp scripts/boot/99-coralreef-permissions.rules /etc/udev/rules.d/
#   sudo update-initramfs -u
#   sudo kernelstub -a "vfio-pci.ids=10de:1d81,10de:10f2,10de:102d"
#   # full power drain reboot (PSU off 10s for PLX capacitor discharge)

# ── Layer 1: Module Load Ordering ────────────────────────────
# vfio-pci loads BEFORE nvidia so it can claim Titan V via PCI ID.
softdep nvidia pre: vfio-pci

# ── Layer 2: PCI ID Claim (Titan V + K80) ────────────────────
# vfio-pci claims Titan V (10de:1d81) and K80 (10de:102d) by PCI ID.
# K80 MUST be in this list — any driver probe through the PLX PEX 8747
# switch triggers a device reset that kills the PCIe link permanently
# (until full PSU power drain). Kernel cmdline vfio-pci.ids is the
# authoritative source; this modprobe option is a safety net.
options vfio-pci ids=10de:1d81,10de:102d disable_idle_d3=1

# ── Layer 3: Nouveau (available for VM oracle cycles) ────────
# nouveau is NOT loaded at boot. It remains available for runtime
# oracle cycles on Titan V (managed by ember) when needed.
# NvPreserveEngines=1: skip PMC engine reset on teardown so falcons
# (FECS/GPCCS/SEC2) survive the nouveau→vfio warm handoff.
install nouveau /sbin/modprobe drm_display_helper; /sbin/modprobe gpu_sched; /sbin/modprobe drm_exec; /sbin/modprobe drm_gpuvm; /sbin/modprobe --ignore-install nouveau NvPreserveEngines=1
remove nouveau /sbin/modprobe -r --ignore-remove nouveau
