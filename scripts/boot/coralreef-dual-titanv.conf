# coralReef dual Titan V modprobe configuration
#
# Purpose: On boot, ONE Titan V (03:00.0) stays on nouveau as the "oracle"
# (warm card for register reference), while the other (4a:00.0) gets vfio-pci
# for sovereign Rust control via GlowPlug.
#
# The RTX 5070 (21:00.0) stays on nvidia for display.
#
# Install:
#   sudo cp scripts/boot/coralreef-dual-titanv.conf /etc/modprobe.d/
#   sudo cp scripts/boot/99-coralreef-vfio.rules /etc/udev/rules.d/
#   sudo update-initramfs -u
#   reboot

# Ensure vfio-pci is loaded early (before nouveau grabs both cards)
softdep nouveau pre: vfio-pci

# Don't auto-bind vfio-pci by vendor:device ID — both Titan V share 10de:1d81.
# Per-device binding is handled by the udev rule targeting specific PCI slots.
options vfio-pci ids=

# Allow nouveau to load (override nvidia's blacklist)
install nouveau /sbin/modprobe --ignore-install nouveau
remove nouveau /sbin/modprobe -r --ignore-remove nouveau
alias nouveau nouveau
