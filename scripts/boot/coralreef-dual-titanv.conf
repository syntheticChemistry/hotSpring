# SPDX-License-Identifier: AGPL-3.0-only
# coralReef modprobe configuration — GPU fleet isolation
#
# Fleet: Titan V (10de:1d81), Tesla K80 (10de:102d), RTX 5070 (10de:2d05)
#
# SOVEREIGNTY: Prevents NVIDIA's open kernel module from probing Titan V
# at boot. The open nvidia.ko only supports Turing+ (GSP-capable) GPUs;
# its failed probe on Volta corrupts HBM2 state and causes lockups.
#
# Strategy:
#   - Titan V claimed by vfio-pci via PCI ID at initramfs (HBM2 protection)
#   - K80 claimed by vfio-pci via udev driver_override (99-coralreef-vfio.rules)
#   - K80 is NOT in vfio-pci.ids — ember manages K80 binding via
#     driver_override + drivers_autoprobe, enabling clean driver swaps
#   - K80 init happens in agentReagents VMs (nvidia-470 reagent), not host kernel
#   - RTX 5070 claimed by nvidia (display head)
#
# Install:
#   sudo cp scripts/boot/coralreef-dual-titanv.conf /etc/modprobe.d/
#   sudo cp scripts/boot/99-coralreef-vfio.rules /etc/udev/rules.d/
#   sudo cp scripts/boot/99-coralreef-permissions.rules /etc/udev/rules.d/
#   sudo update-initramfs -u
#   sudo kernelstub -a "vfio-pci.ids=10de:1d81,10de:10f2"
#   # NOTE: K80 (10de:102d) is intentionally NOT in vfio-pci.ids.
#   # If previously added, remove with: sudo kernelstub -d "vfio-pci.ids=..."
#   # then re-add without 102d: sudo kernelstub -a "vfio-pci.ids=10de:1d81,10de:10f2"
#   # cold reboot (full power off for 10s to reset GPU state)

# ── Layer 1: Module Load Ordering ────────────────────────────
# vfio-pci loads BEFORE nvidia so it can claim Titan V via PCI ID.
softdep nvidia pre: vfio-pci

# ── Layer 2: PCI ID Claim (Titan V only) ─────────────────────
# vfio-pci claims Titan V (10de:1d81) by PCI ID at initramfs time.
# K80 (10de:102d) is NOT listed here — it is managed by ember via
# udev-based driver_override (99-coralreef-vfio.rules). This allows
# ember to swap K80 between drivers without fighting the kernel's
# built-in vfio-pci.ids match table during PCI rescan.
options vfio-pci ids=10de:1d81 disable_idle_d3=1

# ── Layer 3: Nouveau (available for VM oracle cycles) ────────
# nouveau is NOT loaded at boot. It remains available for runtime
# oracle cycles on Titan V (managed by ember) when needed.
install nouveau /sbin/modprobe drm_display_helper; /sbin/modprobe gpu_sched; /sbin/modprobe drm_exec; /sbin/modprobe drm_gpuvm; /sbin/modprobe --ignore-install nouveau
remove nouveau /sbin/modprobe -r --ignore-remove nouveau
