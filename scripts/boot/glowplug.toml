# coralReef GlowPlug daemon configuration
# Dual Titan V setup: one VFIO target, one nouveau oracle

[daemon]
socket = "/run/coralreef/glowplug.sock"
log_level = "info"
health_interval_ms = 5000

# VFIO target — sovereign compute card
[[device]]
bdf = "0000:4a:00.0"
name = "titan-v-target"
boot_personality = "vfio"
power_policy = "always_on"
role = "compute"

# Nouveau oracle — warm reference card
# Uncomment to manage both cards:
# [[device]]
# bdf = "0000:03:00.0"
# name = "titan-v-oracle"
# boot_personality = "nouveau"
# power_policy = "always_on"
# role = "oracle"
