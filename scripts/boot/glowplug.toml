# coralReef GlowPlug daemon configuration
# biomeGate: Titan V + Radeon VII + RTX 5060 (display head)

[daemon]
socket = "/run/coralreef/glowplug.sock"
log_level = "info"
health_interval_ms = 5000

# Titan V — NVIDIA GV100, 12 GB HBM2, VFIO at boot
# Both DRM kernel oops if nouveau boots on non-display GPU
[[device]]
bdf = "0000:03:00.0"
name = "titan-v"
boot_personality = "vfio"
power_policy = "always_on"
role = "oracle"
oracle_dump = "/home/biomegate/Development/ecoPrimals/hotSpring/data/oracle_nouveau_warm.txt"

# Radeon VII — AMD Vega 20 (GFX906), 16 GB HBM2
# Solo IOMMU group. Boots on amdgpu — switch to vfio for sovereign experiments.
[[device]]
bdf = "0000:4c:00.0"
name = "radeon-vii"
boot_personality = "amdgpu"
power_policy = "always_on"
role = "compute"
