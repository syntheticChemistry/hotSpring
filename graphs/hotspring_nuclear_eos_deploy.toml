# SPDX-License-Identifier: AGPL-3.0-or-later
#
# hotSpring Deploy Graph — Nuclear EOS (SEMF / HFB)
#
# Semi-empirical mass formula (L1), Hartree-Fock-Bogoliubov (L2/L3),
# AME2020 binding energy validation. GPU-accelerated HFB via toadStool +
# barraCuda. Provenance trio included for reproducibility certification.
#
# Usage: biomeos deploy --graph graphs/hotspring_nuclear_eos_deploy.toml

[graph]
name = "hotspring_nuclear_eos_deploy"
description = "Nuclear EOS — SEMF/HFB binding energies, AME2020 validation with provenance"
version = "0.6.32"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "hotSpring"
pattern = "deploy"
proto_nucleate = "primalSpring/graphs/downstream/downstream_manifest.toml"
particle_profile = "proton_heavy"
science_domain = "nuclear_physics"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"

# Tower Atomic
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"

# Node Atomic (compute — no shader compilation for EOS)
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"

# Nest Atomic (provenance for reproducibility certification)
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 7
required = true
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 8
required = true
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"

# hotSpring application
[[graph.nodes]]
name = "hotspring"
binary = "hotspring_primal"
order = 9
required = true
spawn = true
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "nestgate"]
health_method = "health.liveness"
by_capability = "physics"
capabilities = [
    "physics.nuclear_eos",
    "compute.df64",
    "compute.f64",
    "composition.health",
    "health.liveness",
    "health.readiness",
    "capabilities.list",
    "mcp.tools.list",
]
