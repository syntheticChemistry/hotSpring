# SPDX-License-Identifier: AGPL-3.0-or-later
#
# hotSpring Deploy Graph — Plasma MD / Transport Coefficients
#
# Yukawa OCP molecular dynamics, Green-Kubo transport (D*, eta*, lambda*),
# screened Coulomb eigenvalues. No sovereign shader compilation needed —
# GPU compute via wgpu WGSL runtime path through toadStool.
#
# Usage: biomeos deploy --graph graphs/hotspring_plasma_md_deploy.toml

[graph]
name = "hotspring_plasma_md_deploy"
description = "Plasma MD — Yukawa OCP, transport coefficients, screened Coulomb"
version = "0.6.32"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
secure_by_default = true
transport = "uds_only"
tcp_ports = 0
owner = "hotSpring"
pattern = "deploy"
proto_nucleate = "primalSpring/graphs/downstream/downstream_manifest.toml"
particle_profile = "proton_heavy"
science_domain = "plasma_physics"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"

# Tower Atomic
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"

# Node Atomic (compute only — no shader compilation)
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"

# Defense / Audit
[[graph.nodes]]
name = "skunkbat"
binary = "skunkbat"
order = 5
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "defense"

# hotSpring application
[[graph.nodes]]
name = "hotspring"
binary = "hotspring_unibin"
order = 6
required = true
spawn = true
depends_on = ["beardog", "songbird", "toadstool", "barracuda"]
health_method = "health.liveness"
by_capability = "physics"
capabilities = [
    "physics.molecular_dynamics",
    "physics.fluid",
    "physics.thermal",
    "compute.df64",
    "compute.f64",
    "composition.health",
    "health.liveness",
    "health.readiness",
    "capabilities.list",
    "mcp.tools.list",
]
