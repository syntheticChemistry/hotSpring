#
# CompChem Explorer Deploy Graph — Visualization (Tower + Node + petalTongue)
#
# Tier 3: Adds petalTongue in live mode for 3D molecular visualization.
# This is the interactive research tier — rotate molecules, navigate
# FEL surfaces, see real-time energy landscapes. Requires petalTongue
# Phase 4 (Perspective3DCoord, GeomSphere, GeomCylinder).
#
# Usage: biomeos deploy --graph graphs/compchem_viz.toml

[graph]
name = "compchem_viz"
description = "CompChem Explorer — 3D molecular visualization (Tower + Node + petalTongue)"
version = "0.1.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
secure_by_default = true
transport = "uds_only"
tcp_ports = 0
owner = "hotSpring"
pattern = "deploy"
proto_nucleate = "primalSpring/graphs/downstream/downstream_manifest.toml"
particle_profile = "proton_heavy"
science_domain = "computational_chemistry"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "viz_atomic"]
product = "compchem-explorer"
tier = 3

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"

[graph.petaltongue]
mode = "live"
tick_hz = 60
data_channels = ["Scatter3D", "FieldMap", "GameScene"]
molecular_viz = true
phase_requirement = 4

# Tower Atomic
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"

# Node Atomic
[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 3
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "shader"

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"

# Visualization
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 6
required = true
spawn = false
depends_on = ["songbird", "barracuda"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = [
    "visualization.render.scene",
    "visualization.render.stream",
    "interaction.poll",
    "interaction.subscribe",
]
