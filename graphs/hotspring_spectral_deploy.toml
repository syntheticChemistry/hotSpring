# SPDX-License-Identifier: AGPL-3.0-or-later
#
# hotSpring Deploy Graph — Spectral Theory (Minimal)
#
# Anderson localization (1D/2D/3D), Hofstadter butterfly, Lanczos
# eigensolver, level spacing statistics. CPU-dominant workloads with
# optional GPU eigensolver via barraCuda. Lightest deploy graph —
# Tower + math only, no shader compilation or provenance.
#
# Usage: biomeos deploy --graph graphs/hotspring_spectral_deploy.toml

[graph]
name = "hotspring_spectral_deploy"
description = "Spectral theory — Anderson localization, Hofstadter, Lanczos (minimal graph)"
version = "0.6.32"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
secure_by_default = true
transport = "uds_only"
tcp_ports = 0
owner = "hotSpring"
pattern = "deploy"
proto_nucleate = "primalSpring/graphs/downstream/downstream_manifest.toml"
particle_profile = "electron"
science_domain = "spectral_theory"
composition_model = "nucleated"
fragments = ["tower_atomic"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
nucleus_internal = "weak"
encryption_tiers.tower = "full"

# Tower Atomic
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"

# Math only (no compute dispatch needed for CPU eigensolvers)
[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 3
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"

# Defense / Audit
[[graph.nodes]]
name = "skunkbat"
binary = "skunkbat"
order = 4
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "defense"

# hotSpring application
[[graph.nodes]]
name = "hotspring"
binary = "hotspring_unibin"
order = 5
required = true
spawn = true
depends_on = ["beardog", "songbird", "barracuda"]
health_method = "health.liveness"
by_capability = "physics"
capabilities = [
    "compute.f64",
    "composition.health",
    "health.liveness",
    "health.readiness",
    "capabilities.list",
    "mcp.tools.list",
]
