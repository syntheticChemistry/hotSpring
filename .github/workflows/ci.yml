name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check + Clippy + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: barracuda
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: barracuda

      - name: cargo check
        run: cargo check --lib --tests

      - name: cargo clippy (lib)
        run: cargo clippy --lib

      - name: cargo test (lib)
        run: cargo test --lib

  format:
    name: Formatting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: barracuda
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt check
        run: cargo fmt --all -- --check
