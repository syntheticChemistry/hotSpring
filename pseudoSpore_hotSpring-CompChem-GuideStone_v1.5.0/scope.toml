simulation_time_ns = 61.8
temperature_k = 340.0
total_atoms = 14637
plum_id = "24.029"
validation = "10 fold/unfold transitions; ΔG_fold=+19.5 kJ/mol (above Tm); convergence <4 kJ/mol"

