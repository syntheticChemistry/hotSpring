additional_papers = [
    "Invernizzi & Parrinello, J. Phys. Chem. Lett. 11, 2731 (2020)",
    "Barducci, Bussi & Parrinello, Phys. Rev. Lett. 100, 020603 (2008)",
]

[[module]]
name = "01_alanine_dipeptide"
status = "PASS"
checks = 6
description = "Alanine dipeptide Ramachandran FEL via well-tempered metadynamics (vacuum)"
method = "WTMetaD"
cv = "phi/psi backbone dihedrals"
force_field = "AMBER99SB-ILDN"
simulation_time_ns = 10
temperature_k = 300.0
total_atoms = 22
plum_id = "24.020"
validation = "C7eq at phi=-81°, C7ax at phi=+60°; barrier 20-45 kJ/mol; block averaging converged"

[[module]]
name = "02_chignolin_opes"
status = "PASS"
checks = 3
description = "Chignolin CLN025 protein folding via OPES + OPES_EXPLORE (explicit water)"
method = "OPES_METAD + OPES_METAD_EXPLORE"
