[target]
id = "01_alanine_dipeptide"
plum_id = "24.020"
method = "well-tempered_metadynamics"
description = "Alanine dipeptide phi/psi FEL in vacuum"
temperature_k = 300.0
cv_names = [
    "phi",
    "psi",
]

[files]
hills = "HILLS"
plumed_dat = "plumed.dat"

[external_sources]
# These values come from PLUMED-NEST plum_id 24.020 — not verifiable from shipped data
total_atoms = 22
force_field = "AMBER99SB-ILDN"
source = "PLUMED-NEST 24.020"

[reference]
barrier_range_kjmol = [
    20.0,
    45.0,
]

[[reference.basins]]
name = "C7eq"
x = -1.4
y = 1.0
tolerance_rad = 0.5

[[reference.basins]]
name = "C7ax"
x = 1.0
y = -0.7
tolerance_rad = 0.5

[tolerances]
# Authority: root tolerances.toml; module overrides documented below
_authority = "tolerances.toml"
barrier_kjmol = 5.0
basin_position_rad = 0.5      # override: root=0.3; 2D phi/psi basins are broader
convergence_std_kjmol = 3.0    # override: root=2.0; vacuum system has higher variance
block_stderr_kjmol = 5.0
folding_fe_kjmol = 4.0

[simulation]
nsteps = 5000000
ntmpi = 1
ntomp = 8
