[target]
id = "01_alanine_dipeptide"
plum_id = "24.020"
method = "well-tempered_metadynamics"
description = "Alanine dipeptide phi/psi FEL in vacuum"
temperature_k = 300.0
cv_names = [
    "phi",
    "psi",
]

[files]
hills = "output/HILLS"
colvar = "output/COLVAR"
plumed_dat = "plumed/plumed.dat"
tpr = "inputs/topol.tpr"

[reference]
barrier_range_kjmol = [
    20.0,
    45.0,
]

[[reference.basins]]
name = "C7eq"
x = -1.4
y = 1.0
tolerance_rad = 0.5

[[reference.basins]]
name = "C7ax"
x = 1.0
y = -0.7
tolerance_rad = 0.5

[tolerances]
barrier_kjmol = 5.0
basin_position_rad = 0.5
convergence_std_kjmol = 3.0
block_stderr_kjmol = 5.0
folding_fe_kjmol = 4.0

[simulation]
nsteps = 5000000
ntmpi = 1
ntomp = 8
